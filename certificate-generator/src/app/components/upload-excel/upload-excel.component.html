<div class="container">

    <div class="upload-card">

        <h2>📄 Upload Excel File</h2>

        <p class="subtitle">
            Select an Excel (.xlsx or .xls) file to upload student details.
        </p>

        <input
            type="file"
            accept=".xlsx,.xls"
            (change)="onFileSelected($event)"
        >

    </div>

</div>
